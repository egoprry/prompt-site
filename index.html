<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>GARDEN</title>
  <meta name="description" content="GARDEN — a collection of prompts for image and video generation.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f43b52'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="topbar-row">
      <a class="brand" href="#/" aria-label="GARDEN — all posts">
        <svg class="wordmark" width="118" height="22" viewBox="0 0 118 22" aria-hidden="true">
          <g font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-style="italic" font-size="19" letter-spacing="-0.5">
            <text x="4" y="18.5" fill="var(--brand-dark)" transform="skewX(-6)">GARDEN</text>
            <text x="3" y="17" fill="var(--brand)" transform="skewX(-6)">GARDEN</text>
          </g>
        </svg>
      </a>
      <nav class="site-nav">
        <a class="nav-link" href="#/" data-nav="list">Posts</a>
        <a class="nav-link" href="#/assets" data-nav="assets">Assets</a>
      </nav>
      <input type="search" id="search" class="input search" placeholder="Search title or content…" autocomplete="off" spellcheck="false" aria-label="Search posts">
      <div class="controls">
        <select id="filter-tag" class="input select" aria-label="Filter by tag">
          <option value="">All tags</option>
        </select>
        <select id="filter-images" class="input select" aria-label="Filter by images">
          <option value="">All posts</option>
          <option value="with">With images</option>
          <option value="without">No images</option>
        </select>
        <select id="sort" class="input select" aria-label="Sort posts">
          <option value="date-desc">Newest</option>
          <option value="date-asc">Oldest</option>
          <option value="title-asc">Title A–Z</option>
          <option value="title-desc">Title Z–A</option>
        </select>
      </div>
      <div class="social">
        <a class="icon-btn" href="https://x.com/groypergarden" target="_blank" rel="noopener" aria-label="X profile @groypergarden">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>
        <a class="icon-btn" href="https://github.com/egoprry/prompt-site" target="_blank" rel="noopener" aria-label="GitHub repository">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <main id="app">
    <div class="status" id="status">Loading…</div>
  </main>

  <footer class="footer">
    <a class="footer-link" href="#/privacy">Privacy</a>
  </footer>

  <div class="tree-modal" id="tree-modal" hidden role="dialog" aria-modal="true" aria-label="Content tree">
    <div class="tree-panel">
      <div class="tree-head">
        <span class="tree-heading">Content tree</span>
        <button class="btn" id="tree-close" aria-label="Close content tree">Close</button>
      </div>
      <div class="tree-body" id="tree-body"></div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="lightbox-bar">
      <span class="lightbox-counter" id="lb-counter"></span>
      <div class="lightbox-actions">
        <button class="btn" id="lb-copy">Copy</button>
        <a class="btn" id="lb-download" href="#" download>Download</a>
        <button class="btn" id="lb-close" aria-label="Close viewer">Close</button>
      </div>
    </div>
    <button class="lightbox-nav prev" id="lb-prev" aria-label="Previous image">&#8592;</button>
    <img class="lightbox-img" id="lb-img" src="" alt="">
    <button class="lightbox-nav next" id="lb-next" aria-label="Next image">&#8594;</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
